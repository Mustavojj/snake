<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GRAM SNAKE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div id="app-loader">
    <div class="loader-container">
        <img src="https://i.ibb.co/bjyVgYqJ/256e636cf3a0.jpg" class="loader-logo" alt="GRAM SNAKE">
        <div class="loader-text" id="loader-text">Loading</div>
    </div>
</div>

<div id="app" style="display:none;">
    <header class="app-header">
        <div class="header-top">
            <div class="user-info">
                <div class="avatar-wrapper">
                    <img id="user-photo" class="user-avatar" src="https://i.ibb.co/XxXhyZYf/file-000000006f8c720e9ab4c76b6e560062.png">
                    <div class="avatar-badge level-badge" id="user-level-badge">1</div>
                </div>
                <div class="user-details">
                    <span id="user-name" class="user-name">User</span>
                </div>
            </div>
            <div class="header-balances" id="header-balances">
                <div class="header-balance" id="header-gram"><img src="https://i.ibb.co/bgX518dY/IMG-20260622-025621-420.png" class="balance-icon"> <span id="gram-balance">0.0000</span></div>
                <div class="header-balance" id="header-games"><img src="https://cdn-icons-png.flaticon.com/512/17301/17301413.png" class="balance-icon"> <span id="games-balance">0</span></div>
            </div>
            <button id="settings-btn" class="header-icon-btn"><i class="fas fa-cog"></i></button>
        </div>
    </header>

    <div id="settings-menu" class="settings-menu" style="display:none;">
        <div class="settings-content">
            <div class="settings-item">
                <span><i class="fas fa-moon"></i> Dark Mode</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="dark-mode-toggle" checked>
                    <span class="toggle-slider"></span>
                </label>
            </div>
            <div class="settings-item">
                <span><i class="fas fa-vibrate"></i> Vibration</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="vibration-toggle" checked>
                    <span class="toggle-slider"></span>
                </label>
            </div>
            <div class="settings-item">
                <span><i class="fas fa-language"></i> Language</span>
                <select id="lang-select" class="lang-select">
                    <option value="en">🇬🇧 English</option>
                    <option value="ru">🇷🇺 Русский</option>
                    <option value="tr">🇹🇷 Türkçe</option>
                    <option value="ar">🇸🇦 العربية</option>
                </select>
            </div>
        </div>
    </div>

    <main id="main-content">
        <div id="home-page" class="page active"></div>
        <div id="games-page" class="page"></div>
        <div id="tasks-page" class="page"></div>
        <div id="invite-page" class="page"></div>
        <div id="wallet-page" class="page"></div>
        <div id="tictactoe-page" class="page"></div>
        <div id="dice-page" class="page"></div>
        <div id="lottery-page" class="page"></div>
        <div id="add-task-page" class="page"></div>
    </main>

    <nav class="bottom-nav">
        <button class="nav-btn active" data-page="home-page"><i class="fas fa-home"></i><span id="nav-home">Home</span></button>
        <button class="nav-btn" data-page="games-page"><i class="fas fa-gamepad"></i><span id="nav-games">Games</span></button>
        <button class="nav-btn" data-page="tasks-page"><i class="fas fa-tasks"></i><span id="nav-tasks">Tasks</span></button>
        <button class="nav-btn" data-page="invite-page"><i class="fas fa-users"></i><span id="nav-invite">Invite</span></button>
        <button class="nav-btn" data-page="wallet-page"><i class="fas fa-wallet"></i><span id="nav-wallet">Wallet</span></button>
    </nav>
</div>

<div id="game-result-modal" class="modal" style="display:none;">
    <div class="modal-content glass-modal game-modal">
        <div class="modal-header">
            <h3><i class="fas fa-gift"></i> <span id="game-result-title">Result</span></h3>
            <button class="modal-close" id="close-game-result">&times;</button>
        </div>
        <div class="modal-body" style="text-align:center">
            <div id="game-result-icon" class="game-result-icon"><i class="fas fa-trophy"></i></div>
            <div id="game-result-detail" class="game-result-detail"></div>
            <div id="game-result-gram" class="game-result-amount"></div>
            <div id="game-result-points" class="game-result-points"></div>
            <div id="game-result-effect" class="game-result-effect"></div>
            <button class="claim-prize-btn" id="game-claim-prize">OK</button>
        </div>
    </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
